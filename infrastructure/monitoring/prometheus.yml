# Prometheus - configuration de scrape pour EcoLoop
# Cible les services exposant des métriques au format Prometheus.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: ecoloop-monitor

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: nginx
    static_configs:
      - targets: ["nginx:9113"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis_exporter:9121"]
