# =============================================================================
# EcoLoop - Render Blueprint (Backend + AI + DB + Redis only)
# =============================================================================
# Frontend & Backoffice are deployed on Vercel
# =============================================================================

# -----------------------------------------------------------------------------
# Base de données PostgreSQL
# IMPORTANT : Render exige que les bases Postgres soient déclarées sous la clé
# racine `databases:`, PAS dans `services:`. Un `type: pserv` dans `services:`
# est un service applicatif privé (il attend un runtime/build) et n'a ni
# `postgresMajorVersion` ni propriété `connectionString` exploitable via
# `fromDatabase`. C'est pourquoi la base était ignorée / le blueprint échouait.
# -----------------------------------------------------------------------------
databases:
  - name: ecoloop-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
    ipAllowList: []

services:
  # ---------------------------------------------------------------------------
  # Redis (cache + rate limiting)
  # `redis` est un alias déprécié de `keyvalue` mais reste accepté. L'ipAllowList
  # est requise pour ce type de service.
  # ---------------------------------------------------------------------------
  - type: redis
    name: ecoloop-redis
    plan: free
    region: oregon
    ipAllowList: []

  # ---------------------------------------------------------------------------
  # Backend API (FastAPI)
  # ---------------------------------------------------------------------------
  - type: web
    name: ecoloop-backend
    env: docker
    dockerfilePath: ./ecoloop_backend/Dockerfile
    dockerContext: ./ecoloop_backend
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecoloop-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ecoloop-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
        # IMPORTANT : cette même valeur doit être recopiée dans JWT_SECRET du
        # service ecoloop-ai ci-dessous. Le backend signe les JWT avec
        # SECRET_KEY (app/config/security.py) et le service IA les vérifie
        # avec JWT_SECRET (config/settings.py) : si les deux valeurs diffèrent,
        # le service IA rejettera tous les tokens émis par le backend.
      - key: JWT_SECRET
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        value: https://ecoloop-web-alpha.vercel.app
        # Utilisé pour construire les liens dans les emails (reset mot de
        # passe, invitations, lien de connexion). Absent de la config
        # précédente => tous les emails envoyés en prod pointaient vers
        # http://localhost:5000 (valeur par défaut de settings.py).
      - key: CORS_ORIGINS
        value: https://ecoloop-web-alpha.vercel.app,https://ecoloop-backoffice.vercel.app
        # NB : "https://*.vercel.app" a été retiré. CORSMiddleware (allow_origins)
        # ne fait que de la correspondance exacte de chaîne : un wildcard ici ne
        # matche jamais rien et ne servait à rien. Le support des sous-domaines
        # *.vercel.app (previews) est géré côté code via allow_origin_regex
        # dans main.py, qui a été complété pour couvrir ce cas.
      - key: AI_SERVICE_URL
        value: https://ecoloop-ai.onrender.com
        # Le backend appelle le service IA. Doit pointer vers le service
        # ecoloop-ai (et NON un ancien domaine orphelin comme ecolo-9zrn).
      - key: ALLOWED_HOSTS
        value: localhost,ecoloop-backend.onrender.com,.onrender.com,*.vercel.app
      - key: API_V1_PREFIX
        value: /api/v1
      - key: APP_NAME
        value: EcoLoop API
      - key: PORT
        value: "8000"
        # Le start.sh lie 0.0.0.0:8000. Render route le trafic vers $PORT
        # (défaut 10000 pour Docker). Sans cette variable, le health check
        # échoue car Render envoie du trafic sur 10000 mais l'app écoute
        # sur 8000.

  # ---------------------------------------------------------------------------
  # Service IA (classification, prédiction, détection de fraude)
  # ---------------------------------------------------------------------------
  - type: web
    name: ecoloop-ai
    env: docker
    dockerfilePath: ./ecoloop_ai/Dockerfile
    dockerContext: ./ecoloop_ai
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        sync: false
        # Doit être IDENTIQUE à la valeur de SECRET_KEY du service
        # ecoloop-backend (voir commentaire ci-dessus).
      - key: ENV
        value: production
      - key: MODEL_PATH
        value: /app/saved_models
      - key: ALLOWED_ORIGINS
        value: https://ecoloop-backend.onrender.com
        # Le service IA n'accepte que le backend courant. L'ancien domaine
        # ecolo-backend-5pdb.onrender.com était obsolète et rejetait tout appel.
      - key: PORT
        value: "8000"
