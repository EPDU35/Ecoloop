# =============================================================================
# EcoLoop - Orchestration complète de l'infrastructure
# =============================================================================
# Ce fichier monte l'ensemble de la plateforme EcoLoop en local ou en
# pré-production. Il relie :
#   - db          : PostgreSQL 16
#   - redis       : cache / rate-limit / blacklist de tokens
#   - backend     : API FastAPI (ecoloop_backend)
#   - web         : front React servi par Nginx (ecoloop_web)
#   - ai          : service de modèles IA (ecoloop_ai)
#   - nginx       : reverse proxy / terminasion TLS (infra/nginx)
#   - prometheus  : métriques (infra/monitoring)
#   - grafana     : tableaux de bord (infra/monitoring)
#
# Usage :
#   docker compose -f infrastructure/docker-compose.yml --env-file ecoloop_backend/.env up --build
#
# Astuces :
#   - Profils disponibles : `monitoring` (prometheus/grafana), `ai` (service IA)
#   - Variables d'environnement externalisées dans ecoloop_backend/.env
# =============================================================================

name: ecoloop

services:
  # ---------------------------------------------------------------------------
  # Base de données
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecoloop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecoloop_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ecoloop_db}
    ports:
      - "5432:5432"
    volumes:
      - ecoloop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecoloop_user} -d ${POSTGRES_DB:-ecoloop_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecoloop_net

  # ---------------------------------------------------------------------------
  # Cache / Rate limiting / Blacklist de tokens
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ecoloop_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ecoloop_net

  # ---------------------------------------------------------------------------
  # API Backend (FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./ecoloop_backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../ecoloop_backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ecoloop_user}:${POSTGRES_PASSWORD:-ecoloop_pass}@db:5432/${POSTGRES_DB:-ecoloop_db}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Active-reload en dev uniquement (à retirer en production)
      - ./ecoloop_backend:/app
    networks:
      - ecoloop_net

  # ---------------------------------------------------------------------------
  # Frontend Web (React + Nginx)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./ecoloop_web
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - ecoloop_net

  # ---------------------------------------------------------------------------
  # Service IA (ecoloop_ai) - profil "ai"
  # ---------------------------------------------------------------------------
  ai:
    build:
      context: ./ecoloop_ai
      dockerfile: ../infrastructure/docker/ai.Dockerfile
    restart: unless-stopped
    environment:
      MODEL_PATH: /models
      BACKEND_URL: http://backend:8000
    ports:
      - "8001:8001"
    volumes:
      - ./ecoloop_ai:/app
      - ecoloop_models:/models
    depends_on:
      - backend
    profiles:
      - ai
    networks:
      - ecoloop_net

  # ---------------------------------------------------------------------------
  # Reverse proxy / Terminaison TLS
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/certs:/etc/nginx/certs:ro
      - ecoloop_nginx_logs:/var/log/nginx
    depends_on:
      - web
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ecoloop_net

  # ---------------------------------------------------------------------------
  # Monitoring - Prometheus (profil "monitoring")
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ecoloop_promdata:/prometheus
    ports:
      - "9090:9090"
    profiles:
      - monitoring
    networks:
      - ecoloop_net

  # ---------------------------------------------------------------------------
  # Monitoring - Grafana (profil "monitoring")
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3001:3000"
    volumes:
      - ecoloop_grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    profiles:
      - monitoring
    networks:
      - ecoloop_net

volumes:
  ecoloop_pgdata:
  ecoloop_redisdata:
  ecoloop_models:
  ecoloop_nginx_logs:
  ecoloop_promdata:
  ecoloop_grafanadata:

networks:
  ecoloop_net:
    driver: bridge
