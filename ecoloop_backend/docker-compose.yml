services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecoloop_user
      POSTGRES_PASSWORD: ecoloop_pass
      POSTGRES_DB: ecoloop_db
    ports:
      - "5432:5432"
    volumes:
      - ecoloop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoloop_user -d ecoloop_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ecoloop_user:ecoloop_pass@db:5432/ecoloop_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 4"

volumes:
  ecoloop_pgdata:
