version: '3.8'

services:
  # 1. Base de données PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: ecoloop_postgres
    restart: always
    environment:
      POSTGRES_USER: ecoloop_user
      POSTGRES_PASSWORD: ecoloop_pass
      POSTGRES_DB: ecoloop_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoloop_user -d ecoloop_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Serveur Backend FastAPI
  backend:
    build:
      context: ./ecoloop_backend
      dockerfile: Dockerfile
    container_name: ecoloop_backend_server
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://ecoloop_user:ecoloop_pass@db:5432/ecoloop_db
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy

  # 3. Application Web React/Vite
  web:
    build:
      context: ./ecoloop_web
      dockerfile: Dockerfile
    container_name: ecoloop_web_app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
