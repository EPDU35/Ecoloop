name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecoloop_backend
        
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ecoloop
          POSTGRES_PASSWORD: ecoloop_test_pwd
          POSTGRES_DB: ecoloop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
          
      - name: Run Tests
        env:
          DATABASE_URL: postgresql+psycopg://ecoloop:ecoloop_test_pwd@localhost:5432/ecoloop_test
          SECRET_KEY: test_secret_key_for_ci_pipeline
          ENVIRONMENT: testing
        run: |
          # Créer les tables via alembic si nécessaire ou SQLAlchemy create_all dans les tests
          pytest tests/ -v

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        project: [ecoloop_web, ecoloop_backoffice]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
          
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci
        
      - name: Type Check & Build
        working-directory: ${{ matrix.project }}
        run: |
          npm run build
