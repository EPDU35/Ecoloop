name: ecoloop_mobile
description: EcoLoop mobile application for Producers and Collectors.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation & State Management
  provider: ^6.1.2

  # HTTP Client
  http: ^1.2.1

  # Local secure storage (Tokens, Preferences)
  flutter_secure_storage: ^9.0.0

  # UI / Icons / Animations
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
