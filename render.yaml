# =============================================================================
# EcoLoop - Render Blueprint (Backend + AI + DB + Redis only)
# =============================================================================
# Frontend & Backoffice are deployed on Vercel
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Base de données PostgreSQL
  # ---------------------------------------------------------------------------
  - type: pserv
    name: ecoloop-db
    plan: free
    region: oregon
    ipAllowList: []
    postgresMajorVersion: 16

  # ---------------------------------------------------------------------------
  # Redis (cache + rate limiting)
  # ---------------------------------------------------------------------------
  - type: redis
    name: ecoloop-redis
    plan: free
    region: oregon
    ipAllowList: []

  # ---------------------------------------------------------------------------
  # Backend API (FastAPI)
  # ---------------------------------------------------------------------------
  - type: web
    name: ecoloop-backend
    env: docker
    dockerfilePath: ./ecoloop_backend/Dockerfile
    dockerContext: ./ecoloop_backend
    plan: free
    region: oregon
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecoloop-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ecoloop-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: https://ecoloop-web-alpha.vercel.app,https://ecoloop-backoffice.vercel.app,https://*.vercel.app
      - key: AI_SERVICE_URL
        value: https://ecoloop-ai.onrender.com
      - key: ALLOWED_HOSTS
        value: ecoloop-backend.onrender.com,.onrender.com,*.vercel.app
      - key: API_V1_PREFIX
        value: /api/v1
      - key: APP_NAME
        value: EcoLoop API

  # ---------------------------------------------------------------------------
  # Service IA (classification, prédiction, détection de fraude)
  # ---------------------------------------------------------------------------
  - type: web
    name: ecoloop-ai
    env: docker
    dockerfilePath: ./ecoloop_ai/Dockerfile
    dockerContext: ./ecoloop_ai
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: ENV
        value: production
      - key: MODEL_PATH
        value: /app/saved_models
      - key: ALLOWED_ORIGINS
        value: https://ecoloop-backend.onrender.com
      - key: PORT
        value: "8000"