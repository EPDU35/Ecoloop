# Override de développement : active le live-reload et expose tous les ports.
# Usage :
#   docker compose -f infrastructure/docker-compose.yml -f infrastructure/docker/docker-compose.override.yml up
#
# En dev, on préfère démarrer le frontend et le mobile en dehors de Docker
# (npm run dev / flutter run) pour profiter du hot-reload natif.

services:
  backend:
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    build:
      target: base

  web:
    # En dev, on sert le front via Vite (hot reload) plutôt que le build Nginx.
    build:
      context: ./ecoloop_web
      dockerfile: ../infrastructure/docker/web.dev.Dockerfile
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]
    ports:
      - "3000:3000"

  nginx:
    profiles: []
    # En dev on garde nginx pour tester le reverse proxy mais sans TLS.
